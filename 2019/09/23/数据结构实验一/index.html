>0</span>)) <span class="built_in">printf</span>(<span class="string">"+"</span>);	<span class="comment">//在非第一项的正系数前输出+号</span></span><br><span class="line">        flag = <span class="number">0</span>;                                   <span class="comment">//flag置为0,表示不是第一项</span></span><br><span class="line">        <span class="keyword">if</span>(q-&gt;coef == <span class="number">0</span>)&#123;                           <span class="comment">//当前项系数为0</span></span><br><span class="line">            <span class="keyword">return</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">"%d"</span>,q-&gt;coef);                       <span class="comment">//当前项系数不为0</span></span><br><span class="line">        <span class="keyword">switch</span>(q-&gt;<span class="built_in">exp</span>)&#123;                             <span class="comment">//判断当前项指数</span></span><br><span class="line">            <span class="keyword">case</span> <span class="number">0</span>:<span class="keyword">break</span>;                           <span class="comment">//当前项指数为0,退出</span></span><br><span class="line">            <span class="keyword">case</span> <span class="number">1</span>:<span class="built_in">printf</span>(<span class="string">"X"</span>);<span class="keyword">break</span>;               <span class="comment">//当前项指数为1,输出X</span></span><br><span class="line">            <span class="keyword">default</span>:<span class="built_in">printf</span>(<span class="string">"X^%d"</span>,q-&gt;<span class="built_in">exp</span>);<span class="keyword">break</span>;    <span class="comment">//当前项指数不为0,也不为1</span></span><br><span class="line">        &#125;</span><br><span class="line">        q = q-&gt;link;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"\n"</span>);</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//多项式的相加,结果存入qx中</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Add</span><span class="params">(polynominal *px,polynominal *qx)</span></span>&#123;</span><br><span class="line">    PNode *q,*q1 = qx-&gt;head,*p, *p1,*temp;    <span class="comment">//q1指向qx的表头结点</span></span><br><span class="line">    p = px-&gt;head-&gt;link;                       <span class="comment">//p指向多项式px的第一个结点</span></span><br><span class="line">    p1 = px-&gt;head;</span><br><span class="line">    q = q1-&gt;link;                             <span class="comment">//q1是q的前驱</span></span><br><span class="line">    <span class="keyword">while</span>(p-&gt;<span class="built_in">exp</span> &gt;= <span class="number">0</span>)&#123;</span><br><span class="line">        <span class="keyword">while</span>(p-&gt;<span class="built_in">exp</span> &lt; q-&gt;<span class="built_in">exp</span>)&#123;               <span class="comment">//跳过q-&gt;exp大的项</span></span><br><span class="line">            q1 = q;</span><br><span class="line">            q = q-&gt;link;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span>(p-&gt;<span class="built_in">exp</span> == q-&gt;<span class="built_in">exp</span>)&#123;                 <span class="comment">//当指数相等时,系数相加</span></span><br><span class="line">            q-&gt;coef = q-&gt;coef + p-&gt;coef;</span><br><span class="line">            <span class="keyword">if</span>(q-&gt;coef == <span class="number">0</span>)&#123;                 <span class="comment">//若相加后系数为0</span></span><br><span class="line">                q1-&gt;link = q-&gt;link;           <span class="comment">//删除q</span></span><br><span class="line">                <span class="built_in">free</span>(q);                      <span class="comment">//释放q的空间</span></span><br><span class="line">                q = q1-&gt;link;                 <span class="comment">//重置q指针</span></span><br><span class="line">                p = p-&gt;link;</span><br><span class="line">            &#125; </span><br><span class="line">            <span class="keyword">else</span>&#123;                             <span class="comment">//若相加后系数不为0</span></span><br><span class="line">                q1 = q;                       <span class="comment">//q1后移</span></span><br><span class="line">                q = q-&gt;link;</span><br><span class="line">                p = p-&gt;link;                  <span class="comment">//p也后移</span></span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span>&#123;                                 <span class="comment">//p-&gt;exp &gt; q-&gt;exp的情况</span></span><br><span class="line">            temp = (PNode*)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(PNode));     <span class="comment">//以p的系数和指数生成新结点</span></span><br><span class="line">            temp-&gt;coef = p-&gt;coef;</span><br><span class="line">            temp-&gt;<span class="built_in">exp</span> = p-&gt;<span class="built_in">exp</span>;</span><br><span class="line">            temp-&gt;link = q1-&gt;link;</span><br><span class="line">            q1-&gt;link = temp;</span><br><span class="line">            q1 = q1-&gt;link;</span><br><span class="line">            p = p-&gt;link;</span><br><span class="line">        &#125;</span><br><span class="line">   &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Multiply</span><span class="params">(polynominal *px,polynominal *qx)</span></span>&#123;</span><br><span class="line">    polynominal qx1,qx2;</span><br><span class="line">    PNode *q1,*q2,*q3,*q4,*pre,*q;</span><br><span class="line">    qx1.head = (PNode*)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(PNode));       <span class="comment">//生成新多项式qx1</span></span><br><span class="line">    qx1.head-&gt;<span class="built_in">exp</span> = <span class="number">-1</span>;</span><br><span class="line">    qx1.head-&gt;link = qx1.head;                      <span class="comment">//qx1改造成循环链表</span></span><br><span class="line">    q1 = px-&gt;head-&gt;link;                            <span class="comment">//q1指向px的第一项</span></span><br><span class="line">    q2 = qx-&gt;head-&gt;link;                            <span class="comment">//q2指向qx的第一项</span></span><br><span class="line">    <span class="keyword">while</span>(q2-&gt;<span class="built_in">exp</span> != <span class="number">-1</span>)&#123;                           <span class="comment">//当q2的指数不为-1时,px先和qx的每一项相乘</span></span><br><span class="line">        q3 = (PNode*)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(PNode));         <span class="comment">//q3存放相乘的结果</span></span><br><span class="line">        q3-&gt;coef = q1-&gt;coef * q2-&gt;coef;</span><br><span class="line">        q3-&gt;<span class="built_in">exp</span> = q1-&gt;<span class="built_in">exp</span> + q2-&gt;<span class="built_in">exp</span>;</span><br><span class="line">        <span class="keyword">if</span>(qx1.head-&gt;link-&gt;<span class="built_in">exp</span> == <span class="number">-1</span>)&#123;              <span class="comment">//q3插入到qx1多项式第一项中</span></span><br><span class="line">            q3-&gt;link = qx1.head-&gt;link;</span><br><span class="line">            qx1.head-&gt;link = q3;</span><br><span class="line">            pre = qx1.head-&gt;link;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span>&#123;                                       <span class="comment">//q3插入到qx1多项式最后一项中</span></span><br><span class="line">            q3-&gt;link = qx1.head;</span><br><span class="line">            pre-&gt;link = q3;</span><br><span class="line">            pre = pre-&gt;link;</span><br><span class="line">        &#125;</span><br><span class="line">        q2 = q2-&gt;link;</span><br><span class="line">    &#125;</span><br><span class="line">    q1 = q1-&gt;link;                                 <span class="comment">//q1后移一位</span></span><br><span class="line">    <span class="keyword">while</span>(q1-&gt;<span class="built_in">exp</span> != <span class="number">-1</span>)&#123;                          <span class="comment">//px剩下来每一项都和qx每一项相乘</span></span><br><span class="line">        q2 = q2-&gt;link;</span><br><span class="line">        qx2.head = (PNode*)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(PNode));  <span class="comment">//生成新多项式qx2</span></span><br><span class="line">        qx2.head-&gt;<span class="built_in">exp</span> = <span class="number">-1</span>;</span><br><span class="line">        qx2.head-&gt;link = qx2.head;</span><br><span class="line">        <span class="keyword">while</span>(q2-&gt;<span class="built_in">exp</span> != <span class="number">-1</span>)&#123;   	</span><br><span class="line">            q4 = (PNode*)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(PNode));</span><br><span class="line">            q4-&gt;coef = q1-&gt;coef * q2-&gt;coef;</span><br><span class="line">            q4-&gt;<span class="built_in">exp</span> = q1-&gt;<span class="built_in">exp</span> + q2-&gt;<span class="built_in">exp</span>;</span><br><span class="line">            <span class="keyword">if</span>(qx2.head-&gt;link-&gt;<span class="built_in">exp</span> == <span class="number">-1</span>)&#123;</span><br><span class="line">                q4-&gt;link = qx2.head-&gt;link;</span><br><span class="line">                qx2.head-&gt;link = q4;</span><br><span class="line">                pre = qx2.head-&gt;link;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">else</span>&#123;</span><br><span class="line">                q4-&gt;link = qx2.head;</span><br><span class="line">                pre-&gt;link = q4;</span><br><span class="line">                pre = pre-&gt;link;</span><br><span class="line">            &#125;</span><br><span class="line">            q2 = q2-&gt;link;</span><br><span class="line">        &#125;</span><br><span class="line">        Add(&amp;qx2,&amp;qx1);                            <span class="comment">//合并同类项</span></span><br><span class="line">        q1 = q1-&gt;link;</span><br><span class="line">    &#125;</span><br><span class="line">    Output(qx1);</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    polynominal p1,p2;</span><br><span class="line">    Create(&amp;p1);</span><br><span class="line">    Output(p1);</span><br><span class="line">    Create(&amp;p2);</span><br><span class="line">    Output(p2);</span><br><span class="line">    Add(&amp;p1,&amp;p2);</span><br><span class="line">    Multiply(&amp;p1,&amp;p2);</span><br><span class="line">    system(<span class="string">"pause"</span>);</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
